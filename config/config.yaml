sync_mode: osxphotos

paths:
  project_dir: .
  incoming_dir: data/incoming
  processed_dir: data/processed
  transcripts_dir: data/transcripts
  audio_dir: data/audio
  state_db: state/transcriber.sqlite3
  log_file: data/logs/run.log

osxphotos:
  library: ~/Pictures/Photos Library.photoslibrary
  hours_back: 24
  max_videos_per_run: 20
  candidate_scan_limit: 200
  album: null
  favorite_only: false

storage:
  delete_video_after_transcription: true
  delete_audio_after_transcription: true

transcription:
  model: medium
  device: auto
  compute_type: auto
  language: fr
  beam_size: 5
  vad_filter: true
  formats: [txt, srt, json]

video_extensions: [.mov, .mp4, .m4v]
min_duration_seconds: 30
manual_sources_file: config/manual_sources.json
